name: Build Windows Executable

# Opt-in to Node.js 24 now to test compatibility
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'  # Change to match your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install customtkinter
        pip install customtkinter --upgrade

        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }

    - name: Build executable with PyInstaller
      run: |
        # Replace 'your_python_file.py' with your actual filename
        pyinstaller main.py --onefile -w
        
        
        # If you have an icon file (app.ico), add: --icon=app.ico

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Attract-Mode Plus Layout Designer-${{ github.run_number }}
        path: dist/*.exe
